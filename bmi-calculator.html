<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background: #218838; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>BMI Calculator</h2>
    <input type="number" id="height" placeholder="Height (cm)">
    <input type="number" id="weight" placeholder="Weight (kg)">
    <button onclick="calculateBMI()">Calculate BMI</button>
    <div id="result"></div>
</div>

<script>
    function calculateBMI() {
        const height = document.getElementById('height').value / 100;
        const weight = document.getElementById('weight').value;
        const resultDiv = document.getElementById('result');

        if (height > 0 && weight > 0) {
            const bmi = (weight / (height * height)).toFixed(1);
            let category = "";

            if (bmi < 18.5) category = "Underweight";
            else if (bmi < 25) category = "Normal weight";
            else if (bmi < 30) category = "Overweight";
            else category = "Obese";

            resultDiv.innerHTML = `Your BMI is <strong>${bmi}</strong><br>Category: ${category}`;
        } else {
            resultDiv.innerText = "Please enter valid values";
        }
    }
</script>

</body>
</html>
