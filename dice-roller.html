<style>
    /* Increase the transition duration and add an elastic bounce effect */
    .dice { 
        width: 100px; height: 100px; 
        transform-style: preserve-3d; 
        /* The cubic-bezier makes the spin feel energetic and snappy */
        transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        cursor: pointer; 
    }
    /* ... keep your existing .face styles ... */
</style>

<script>
    function rollDice() {
        const dice = document.getElementById('dice');
        const randomValue = Math.floor(Math.random() * 6) + 1;
        
        let x = 0, y = 0;
        switch(randomValue) {
            case 1: x = 0; y = 0; break;
            case 2: x = -90; y = 0; break;
            case 3: x = 0; y = -90; break;
            case 4: x = 0; y = 90; break;
            case 5: x = 90; y = 0; break;
            case 6: x = 180; y = 0; break;
        }
        
        // Multiply the base rotations to make the dice spin multiple times before settling
        const extraSpinX = 720; // Two full rotations
        const extraSpinY = 720;
        
        dice.style.transform = `rotateX(${x + extraSpinX}deg) rotateY(${y + extraSpinY}deg)`;
    }
</script>

    </style>
</head>
<body>

<div class="dice" id="dice">
    <div class="face front">1</div>
    <div class="face back">6</div>
    <div class="face right">3</div>
    <div class="face left">4</div>
    <div class="face top">2</div>
    <div class="face bottom">5</div>
</div>

<button onclick="rollDice()">Roll Dice</button>

<script>
    function rollDice() {
        const dice = document.getElementById('dice');
        const randomValue = Math.floor(Math.random() * 6) + 1;
        
        let x = 0, y = 0;
        switch(randomValue) {
            case 1: x = 0; y = 0; break;
            case 2: x = -90; y = 0; break;
            case 3: x = 0; y = -90; break;
            case 4: x = 0; y = 90; break;
            case 5: x = 90; y = 0; break;
            case 6: x = 180; y = 0; break;
        }
        
        dice.style.transform = `rotateX(${x + 360}deg) rotateY(${y + 360}deg)`;
    }
</script>

</body>
</html>
