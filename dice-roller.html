<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dice Roller</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .dice { width: 100px; height: 100px; transform-style: preserve-3d; transition: transform 1s ease-out; cursor: pointer; }
        .face { position: absolute; width: 100px; height: 100px; background: white; border: 2px solid #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: inset 0 0 10px #ccc; }
        
        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        button { margin-top: 60px; padding: 12px 30px; font-size: 16px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 30px; transition: 0.2s; }
        button:hover { background: #174ea6; }
    </style>
</head>
<body>

<div class="dice" id="dice">
    <div class="face front">1</div>
    <div class="face back">6</div>
    <div class="face right">3</div>
    <div class="face left">4</div>
    <div class="face top">2</div>
    <div class="face bottom">5</div>
</div>

<button onclick="rollDice()">Roll Dice</button>

<script>
    function rollDice() {
        const dice = document.getElementById('dice');
        const randomValue = Math.floor(Math.random() * 6) + 1;
        
        let x = 0, y = 0;
        switch(randomValue) {
            case 1: x = 0; y = 0; break;
            case 2: x = -90; y = 0; break;
            case 3: x = 0; y = -90; break;
            case 4: x = 0; y = 90; break;
            case 5: x = 90; y = 0; break;
            case 6: x = 180; y = 0; break;
        }
        
        dice.style.transform = `rotateX(${x + 360}deg) rotateY(${y + 360}deg)`;
    }
</script>

</body>
</html>
