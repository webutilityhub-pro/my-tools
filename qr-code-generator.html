<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        input { 
            width: 300px; 
            padding: 12px; 
            margin-bottom: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px;
        }
        button { 
            padding: 10px 20px; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px;
        }
        #result { margin-top: 20px; }
    </style>
</head>
<body>

    <input type="text" id="input" placeholder="Enter text or URL">
    <button onclick="generate()">Generate</button>

    <div id="result"></div>

    <script>
                                            function generate() {
                const val = document.getElementById('input').value;
                const res = document.getElementById('result');

                if (!val) return;

                const baseUrl = "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=";
                const url = baseUrl + encodeURIComponent(val);
                
                res.innerHTML = '<img src="' + url + '"><br><a href="' + url + '" download="qrcode.png">Download</a>';
            }

            }

    </script>
</body>
</html>
