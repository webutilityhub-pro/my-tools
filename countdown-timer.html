<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #timer { font-size: 5rem; margin-top: 20vh; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="timer">10</div>
<canvas id="canvas"></canvas>

<script>
    const timerElement = document.getElementById('timer');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let timeLeft = 10;
    let fireworks = [];

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Countdown logic
    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.innerText = "Happy New Year!";
            launchFireworks();
        }
    }, 1000);

    // Firework particle class
    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.alpha = 1;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 0.02;
        }
    }

    function launchFireworks() {
        for (let i = 0; i < 100; i++) {
            fireworks.push(new Particle(canvas.width / 2, canvas.height / 2));
        }
        animate();
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        fireworks.forEach((p, index) => {
            p.update();
            p.draw();
            if (p.alpha <= 0) fireworks.splice(index, 1);
        });
        if (fireworks.length > 0) requestAnimationFrame(animate);
    }
</script>
</body>
</html>
