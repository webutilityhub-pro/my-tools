<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        #controls { margin-top: 50px; }
        #timer { font-size: 5rem; margin-top: 20px; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        input { padding: 10px; font-size: 1rem; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="controls">
    <input type="number" id="timeInput" placeholder="Enter seconds" min="1">
    <button onclick="startTimer()">Start Countdown</button>
</div>
<div id="timer">0</div>
<canvas id="canvas"></canvas>

<script>
    const timerElement = document.getElementById('timer');
    const timeInput = document.getElementById('timeInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let countdownInterval;
    let fireworks = [];

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function startTimer() {
        clearInterval(countdownInterval);
        let timeLeft = parseInt(timeInput.value);
        if (isNaN(timeLeft) || timeLeft <= 0) return;
        
        timerElement.innerText = timeLeft;

        countdownInterval = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                timerElement.innerText = "BOOM!";
                launchFireworks();
            }
        }, 1000);
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 12;
            this.vy = (Math.random() - 0.5) * 12;
            this.alpha = 1;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 0.015;
        }
    }

    function launchFireworks() {
        for (let i = 0; i < 200; i++) {
            fireworks.push(new Particle(canvas.width / 2, canvas.height / 2));
        }
        animate();
    }
