<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>密碼產生器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; margin: 0; }
        .box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { font-size: 1.5rem; width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 1rem; text-align: center; }
        button { padding: 10px 20px; font-size: 1rem; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="box">
        <h2>密碼產生器</h2>
        <input type="text" id="result" readonly>
        <br>
        <button onclick="makePassword()">產生密碼</button>
    </div>
    <script>
        function makePassword() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
            let password = "";
            for (let i = 0; i < 16; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById("result").value = password;
        }
    </script>
</body>
</html>
