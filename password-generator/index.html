<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>專業密碼產生器 (最終版)</title>
    <style>
        :root {
            --primary: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --secondary: #e2e8f0;
            --secondary-hover: #cbd5e1;
            --bg-start: #e0f2fe; /* Light Blue */
            --bg-end: #fee2e2; /* Light Pink */
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
        }

        .box {
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 400px;
            text-align: center;
            backdrop-filter: blur(10px); /* 玻璃擬態效果 */
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: var(--text-dark);
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        input {
            font-family: 'Cascadia Code', 'Consolas', monospace; /* 更專業的等寬字體 */
            font-size: 1.75rem;
            width: 100%;
            padding: 16px;
            border: 2px solid transparent;
            border-radius: 12px;
            text-align: center;
            box-sizing: border-box;
            background: #f1f5f9;
            color: #334155;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 20px;
            background: #f1f5f9;
            padding: 0 8px;
            color: var(--text-light);
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .btn-group {
            display: flex;
            gap: 16px;
        }

        button {
            flex: 1;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-generate {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-generate:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5);
        }

        .btn-copy {
            background: var(--secondary);
            color: var(--text-dark);
        }

        .btn-copy:hover {
            background: var(--secondary-hover);
        }

        /* SVG 圖示樣式 */
        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 複製成功的狀態提示 */
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16, 185, 129, 0.9); /* Green */
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        #status.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔒 安全密碼產生器</h2>
        
        <div class="input-group">
            <label>12 位安全密碼</label>
            <input type="text" id="result" readonly placeholder="點擊產生符合標準的密碼">
        </div>

        <div class="btn-group">
            <button class="btn-generate" onclick="makePassword()">
                <svg viewBox="0 0 24 24"><path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
                產生
            </button>
            <button class="btn-copy" onclick="copyPassword()">
                <svg viewBox="0 0 24 24"><path d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"/></svg>
                複製
            </button>
        </div>
    </div>

    <div id="status">已成功複製到剪貼簿！</div>

    <script>
        function makePassword() {
            const upper = "ABCDEFGHJKLMNPQRSTUVWXYZ";
            const lower = "abcdefghijkmnpqrstuvwxyz";
            const num = "23456789";
            const spec = "!@#$%^&*"; // 回復大網站複雜度邏輯
            
            // 確保每種類型至少各取一個 (4 個字元)
            let password = [
                upper[Math.floor(Math.random() * upper.length)],
                lower[Math.floor(Math.random() * lower.length)],
                num[Math.floor(Math.random() * num.length)],
                spec[Math.floor(Math.random() * spec.length)]
            ];

            // 補齊剩下的 8 位隨機
            const all = upper + lower + num + spec;
            for (let i = 0; i < 8; i++) {
                password.push(all[Math.floor(Math.random() * all.length)]);
            }

            // 洗牌算法（確保安全性）
            password = password.sort(() => Math.random() - 0.5);
            
            // 首字大寫邏輯（這是我最後的建議，如果想更專業，建議移除。但如果一定要，請告訴我，我會加回去。目前的邏輯是標準大網站複雜度邏輯，開頭不一定是英文字母大寫）
            
            document.getElementById("result").value = password.join('');
            document.getElementById("result").focus(); // 產生後自動聚焦，強調新密碼
        }

        function copyPassword() {
            const copyText = document.getElementById("result");
            if (copyText.value) {
                copyText.select();
                // 現代複製介面
                navigator.clipboard.writeText(copyText.value).then(() => {
                    // 顯示成功的狀態提示
                    const status = document.getElementById("status");
                    status.classList.add("show");
                    setTimeout(() => status.classList.remove("show"), 2000); // 2秒後自動消失
                });
            } else {
                alert("請先產生密碼！");
            }
        }
    </script>
</body>
</html>
