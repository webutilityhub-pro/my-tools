<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batting Average Calculator</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 300px; 
        }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.9rem; }
        input { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 1rem; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1rem; 
        }
        .result-box { 
            text-align: center; 
            padding: 1rem; 
            background: #eef2f7; 
            border-radius: 8px; 
            margin-top: 1rem; 
        }
        .result-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .result-value { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>Batting Average</h2>
    
    <label for="ab">At-Bats (AB)</label>
    <input type="number" id="ab" oninput="calculateAVG()" placeholder="e.g. 20">
    
    <label for="h">Hits (H)</label>
    <input type="number" id="h" oninput="calculateAVG()" placeholder="e.g. 6">
    
    <div class="result-box">
        <div class="result-label">Batting Average</div>
        <div id="avg" class="result-value">.000</div>
    </div>
</div>

<script>
    function calculateAVG() {
        const ab = parseFloat(document.getElementById('ab').value);
        const h = parseFloat(document.getElementById('h').value);
        const avgDisplay = document.getElementById('avg');
        
        if (ab > 0 && h >= 0 && h <= ab) {
            const avg = (h / ab).toFixed(3);
            avgDisplay.innerText = avg.replace('0.', '.');
        } else {
            avgDisplay.innerText = ".000";
        }
    }
</script>

</body>
</html>
