<!DOCTYPE html>
<html lang="en">
<head><script async src="https://www.googletagmanager.com/gtag/js?id=G-73NZXM9XKP"></script>
<script src="analytics.js"></script>

    <meta charset="UTF-8">
    <title>Password Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { text-align: center; border: 1px solid #ccc; padding: 30px; border-radius: 15px; background: white; width: 320px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { font-size: 20px; padding: 10px; text-align: center; width: 90%; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { font-size: 18px; padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Password Generator</h2>
        <input type="text" id="result" readonly placeholder="Your password">
        <br>
        <button onclick="makePassword()">Generate</button>
    </div>

    <script>
        function makePassword() {
            const up = "ABCDEFGHJKLMNPQRSTUVWXYZ";
            const low = "abcdefghijkmnpqrstuvwxyz";
            const num = "23456789";
            const spec = "!@#$%^&*";

            // 1. Force first character to be uppercase
            let password = [up[Math.floor(Math.random() * up.length)]];
            
            // 2. Generate 10 alphanumeric characters
            const chars = up + low + num;
            for(let i = 0; i < 10; i++) {
                password.push(chars[Math.floor(Math.random() * chars.length)]);
            }

            // 3. Insert exactly one special character at a random position (1-10)
            const sIndex = Math.floor(Math.random() * 10) + 1;
            password[sIndex] = spec[Math.floor(Math.random() * spec.length)];

            // 4. Output to result field
            document.getElementById("result").value = password.join('');
        }
    </script>
</body>
</html>
