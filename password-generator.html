<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>密碼產生器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { text-align: center; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        input { font-size: 20px; padding: 10px; text-align: center; }
        button { font-size: 20px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>密碼產生器</h2>
        <input type="text" id="result" readonly>
        <br><br>
        <button onclick="makePassword()">產生密碼</button>
    </div>

    <script>
        function makePassword() {
            const up = "ABCDEFGHJKLMNPQRSTUVWXYZ";
            const low = "abcdefghijkmnpqrstuvwxyz";
            const num = "23456789";
            const spec = "!@#$%^&*";

            let p = [];
            // 1. 第一個字固定大寫
            p.push(up[Math.floor(Math.random() * up.length)]);
            
            // 2. 接下來填滿 10 個英數字
            const chars = up + low + num;
            for(let i=0; i<10; i++) {
                p.push(chars[Math.floor(Math.random() * chars.length)]);
            }

            // 3. 插入一個特殊符號 (位置在 1-10 之間，避開開頭)
            const sIndex = Math.floor(Math.random() * 10) + 1;
            p[sIndex] = spec[Math.floor(Math.random() * spec.length)];

            document.getElementById("result").value = p.join('');
        }
    </script>
</body>
</html>
