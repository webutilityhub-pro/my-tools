<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERA Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 300px; }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .result-box { text-align: center; padding: 1rem; background: #eef2f7; border-radius: 8px; margin-top: 1rem; }
        .result-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .result-value { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        .hint { font-size: 0.75rem; color: #999; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>ERA Calculator</h2>
    
    <label for="er">Earned Runs (ER)</label>
    <input type="number" id="er" oninput="calculateERA()" placeholder="e.g. 3">
    
    <label for="ip">Innings Pitched (IP)</label>
    <div class="hint">Use .1 for 1 out, .2 for 2 outs</div>
    <input type="number" id="ip" step="0.1" oninput="calculateERA()" placeholder="e.g. 6.1">
    
    <div class="result-box">
        <div class="result-label">ERA</div>
        <div id="era" class="result-value">0.00</div>
    </div>
</div>

<script>
    function calculateERA() {
        const er = parseFloat(document.getElementById('er').value) || 0;
        const ipInput = parseFloat(document.getElementById('ip').value) || 0;
        const eraDisplay = document.getElementById('era');
        
        // Convert innings like 6.1 to 6.333
        const fullInnings = Math.floor(ipInput);
        const outs = (ipInput - fullInnings) * 10;
        const totalIP = fullInnings + (outs / 3);
        
        if (totalIP > 0) {
            const era = ((er * 9) / totalIP).toFixed(2);
            eraDisplay.innerText = era;
        } else {
            eraDisplay.innerText = "0.00";
        }
    }
</script>

</body>
</html>
